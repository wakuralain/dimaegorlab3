name: C++ CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install lcov
      run: |
        sudo apt-get update
        sudo apt-get install -y lcov

    - name: Compile
      run: |
        g++ -fprofile-arcs -ftest-coverage test_main.cpp -o test_runner

    - name: Run Tests
      run: |
        ./test_runner

    - name: Generate Coverage
      run: |
        lcov --capture --initial --directory . --output-file base.info
        lcov --capture --directory . --output-file test.info
        lcov --add-tracefile base.info --add-tracefile test.info --output-file total.info
        lcov --remove total.info '/usr/*' --output-file coverage.info

    - name: Display Coverage in Logs
      run: |
        lcov --list coverage.info
